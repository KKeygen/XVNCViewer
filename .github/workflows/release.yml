name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS arm64 app
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npx tauri build --target aarch64-apple-darwin --bundles app

      - name: Archive app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "src-tauri/target/aarch64-apple-darwin/release/bundle/macos/XVNCViewer.app" \
            "XVNCViewer-${{ github.ref_name }}-macos-arm64.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: XVNCViewer-${{ github.ref_name }}-macos-arm64.zip
          if-no-files-found: error

  build-windows:
    name: Build Windows x64 installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npx tauri build --target x86_64-pc-windows-msvc --bundles nsis

      - name: Stage installer
        shell: pwsh
        run: |
          $asset = Get-ChildItem -Path "src-tauri\target\x86_64-pc-windows-msvc\release\bundle\nsis" -Filter "*.exe" | Select-Object -First 1
          if (-not $asset) { throw "Windows installer was not produced" }
          Copy-Item $asset.FullName "XVNCViewer-${{ github.ref_name }}-windows-x64.exe"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: XVNCViewer-${{ github.ref_name }}-windows-x64.exe
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: XVNCViewer ${{ github.ref_name }}
          files: release-assets/*
          generate_release_notes: true
